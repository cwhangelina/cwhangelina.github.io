<style>
  @page {

  }

  * {

  }

  body {

  }

  .page {
    width: 281mm;
    min-height: 194mm;
    margin: 0 auto 12mm auto;
    padding: 7mm;
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 8px 28px rgba(15, 23, 42, 0.16);
    page-break-after: always;
    overflow: hidden;
  }

  .page:last-child {
    page-break-after: auto;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 10mm;
    margin-bottom: 4mm;
    padding: 5mm 6mm;
    border-radius: 16px;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    color: white;
  }

  .header h1 {
    margin: 0;
    font-size: 26pt;
    line-height: 1;
    letter-spacing: 0.5px;
  }

  .header .subtitle {
    margin-top: 2mm;
    font-size: 10pt;
    opacity: 0.95;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 2mm;
    max-width: 135mm;
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 1.5mm;
    padding: 1.2mm 2.4mm;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.18);
    font-size: 7.2pt;
    white-space: nowrap;
  }

  .dot {
    width: 3mm;
    height: 3mm;
    border-radius: 999px;
    display: inline-block;
    background: var(--c);
    border: 1px solid rgba(255,255,255,0.75);
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2mm;
  }

  .weekday {
    text-align: center;
    font-size: 9pt;
    font-weight: 800;
    padding: 2mm 0;
    color: #334155;
    background: #e0f2fe;
    border-radius: 10px;
  }

  .day {
    min-height: 24mm;
    border-radius: 12px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    padding: 1.5mm;
    position: relative;
    overflow: hidden;
  }

  .day.empty {
    background: repeating-linear-gradient(
      -45deg,
      #f8fafc,
      #f8fafc 4px,
      #eef2f7 4px,
      #eef2f7 8px
    );
    opacity: 0.55;
  }

  .date-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1mm;
  }

  .date-num {
    width: 6.5mm;
    height: 6.5mm;
    border-radius: 999px;
    background: #ffffff;
    color: #0f172a;
    border: 1px solid #cbd5e1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 8.5pt;
    font-weight: 900;
  }

  .busy-count {
    font-size: 6.5pt;
    color: #64748b;
    font-weight: 700;
  }

  .events {
    display: flex;
    flex-direction: column;
    gap: 0.9mm;
  }

  .event {
    border-left: 3px solid var(--c);
    background: var(--bg);
    color: #111827;
    border-radius: 7px;
    padding: 1mm 1.2mm;
    font-size: 6.35pt;
    line-height: 1.18;
    overflow: hidden;
    break-inside: avoid;
  }

  .event .time {
    display: inline-block;
    font-weight: 900;
    color: #0f172a;
    margin-right: 1mm;
  }

  .event .name {
    font-weight: 750;
  }

  .event .loc {
    display: block;
    color: #475569;
    font-size: 5.8pt;
    margin-top: 0.5mm;
    white-space: normal;
    overflow: visible;
    text-overflow: clip;
    line-height: 1.12;
  }

  .all-day {
    border-left-color: #ec4899;
    background: #fce7f3;
  }

  .note {
    margin-top: 3mm;
    padding: 2mm 4mm;
    border-radius: 12px;
    background: #f1f5f9;
    color: #475569;
    font-size: 7.4pt;
    display: flex;
    justify-content: space-between;
    gap: 4mm;

  .category-special { --c: #64748b; --bg: #f1f5f9; }

  @media print {
    body {

    }

    .page {
      width: auto;
      min-height: auto;
      margin: 0;
      box-shadow: none;
      border-radius: 0;
    }
  }
</style>

function pad2(num) {
  return String(num).padStart(2, "0");
}

function dateKey(year, month, day) {
  return `${year}-${pad2(month)}-${pad2(day)}`;
}

function getDaysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

function getFirstDayIndexSundayStart(year, month) {
  return new Date(year, month - 1, 1).getDay();
}

function timeToMinutes(time) {
  if (!time) return -1;
  const [h, m] = time.split(":").map(Number);
  return h * 60 + m;
}

function sortEvents(events) {
  return [...events].sort((a, b) => {
    if (a.allDay && !b.allDay) return -1;
    if (!a.allDay && b.allDay) return 1;
    return timeToMinutes(a.start) - timeToMinutes(b.start);
  });
}

function getEventsForDate(date) {
  return sortEvents(EVENTS.filter(event => event.date === date));
}

function getUsedCategoriesForMonth(year, month) {
  const prefix = `${year}-${pad2(month)}-`;
  const used = new Set();

  EVENTS.forEach(event => {
    if (event.date.startsWith(prefix)) {
      used.add(event.category || "special");
    }
  });

  return Array.from(used);
}

function getLocation(event) {
  return event.location || DEFAULT_LOCATIONS[event.category] || "";
}

function createLegend(year, month) {
  const categories = getUsedCategoriesForMonth(year, month);

  return categories.map(category => {
    const label = CATEGORY_LABELS[category] || category;
    const color = CATEGORY_COLORS[category] || CATEGORY_COLORS.special;

    return `
      <span class="legend-item">
        <span class="dot" style="--c:${color}"></span>
        ${escapeHtml(label)}
      </span>
    `;
  }).join("");
}

  const categoryClass = `category-${category}`;
  const allDayClass = event.allDay ? " all-day" : "";
  const timeText = event.allDay ? "All day" : `${event.start}–${event.end}`;
  const location = getLocation(event);

  return `
    <div class="event ${categoryClass}${allDayClass}">
      <span class="time">${escapeHtml(timeText)}</span>
      <span class="name">${escapeHtml(event.title)}</span>
      ${location ? `<span class="loc">@ ${escapeHtml(location)}</span>` : ""}
    </div>
  `;
}

function createDayCell(year, month, day) {
  const key = dateKey(year, month, day);
  const events = getEventsForDate(key);
  const countText = events.length === 0
    ? ""
    : events.length === 1
      ? "1 event"
      : `${events.length} events`;

  return `
    <div class="day">
      <div class="date-line">
        <span class="date-num">${day}</span>
        <span class="busy-count">${countText}</span>
      </div>
      <div class="events">
        ${events.map(createEventHtml).join("")}
      </div>
    </div>
  `;
}

function createEmptyCell() {
  return `<div class="day empty"></div>`;
}

function createMonthPage({ year, month, title }) {
  const daysInMonth = getDaysInMonth(year, month);
  const firstDayIndex = getFirstDayIndexSundayStart(year, month);

  const cells = [];

  for (let i = 0; i < firstDayIndex; i++) {
    cells.push(createEmptyCell());
  }

  for (let day = 1; day <= daysInMonth; day++) {
    cells.push(createDayCell(year, month, day));
  }

  while (cells.length % 7 !== 0) {
    cells.push(createEmptyCell());
  }

  return `
    <section class="page">
      <header class="header">
        <div>
          <h1>${escapeHtml(title)}</h1>
          <div class="subtitle">Hoi Hoi Activities Calendar · Time zone: UTC+8 · Sunday start</div>
        </div>
        <div class="legend">
          ${createLegend(year, month)}
        </div>
      </header>

      <div class="calendar">
        ${WEEKDAYS.map(day => `<div class="weekday">${day}</div>`).join("")}
        ${cells.join("")}
      </div>

      <div class="note">
        <span>可直接修改 EVENTS 的 start / end / title；預設地點在 DEFAULT_LOCATIONS 修改。</span>
        <span>A4 · Landscape · Background graphics on</span>
      </div>
    </section>
  `;
}

function renderCalendar() {
  const root = document.getElementById("calendar-root");
  root.innerHTML = MONTHS.map(createMonthPage).join("");
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

renderCalendar();
</script>
