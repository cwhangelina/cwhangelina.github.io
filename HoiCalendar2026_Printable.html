<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>July & August 2026 Activities Calendar (Printable)</title>
<style>
  @page {
    size: A4 landscape;
    margin: 2mm;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: #ffffff;
    color: #111827;
    font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .page {
    width: 285mm;
    min-height: 195mm;
    margin: 0 auto;
    padding: 4mm 5mm;
    background: #ffffff;
    page-break-after: always;
    overflow: hidden;
  }

  .page:last-child {
    page-break-after: auto;
  }

  .month-title {
    margin: 0 0 4mm 0;
    padding: 2mm 0;
    text-align: center;
    font-size: 22pt;
    line-height: 1.1;
    font-weight: 900;
    color: #111827;
    border-bottom: 2.5px solid #111827;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1.2mm;
  }

  .weekday {
    text-align: center;
    font-size: 12pt;
    font-weight: 900;
    /* padding: 1.5mm 0; */
    color: #111827;
    background: #dbeafe;
    border: 1px solid #93c5fd;
    border-radius: 4px;
  }

  .day {
    min-height: 30mm;
    border-radius: 5px;
    background: #f8fafc;
    /* border: 1px solid #cbd5e1; */
    /* padding: 1mm 1.2mm; */
    position: relative;
    overflow: hidden;
  }

  .day.empty {
    background: #f1f5f9;
    opacity: 0.45;
  }

  .date-line {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    margin-bottom: 0.8mm;
  }

  .date-num {
    width: 5mm;
    height: 5mm;
    border-radius: 999px;
    background: #ffffff;
    color: #111827;
    border: 1px solid #94a3b8;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 8pt;
    font-weight: 900;
  }

  .events {
    display: flex;
    flex-direction: column;
    gap: 0.6mm;
  }

  .event {
    border-left: 3px solid var(--c);
    background: var(--bg);
    color: #111827;
    border-radius: 4px;
    padding: 0.8mm 1mm;
    font-size: 8.5pt;
    line-height: 1.2;
    overflow: hidden;
    break-inside: avoid;
  }

  .event .time {
    display: block;
    font-weight: 900;
    color: #111827;
    font-size: 9pt;
    line-height: 1.15;
    margin-bottom: 0.2mm;
  }

  .event .name {
    display: block;
    font-weight: 750;
    font-size: 10pt;
    line-height: 1.2;
  }

  .event .loc {
    display: block;
    color: #334155;
    font-size: 7.8pt;
    font-weight: 600;
    margin-top: 0.2mm;
    line-height: 1.15;
    white-space: normal;
  }

  .all-day {
    border-left-color: #ec4899;
    background: #fce7f3;
  }

  .category-mandarin { --c: #ef4444; --bg: #fee2e2; }
  .category-fitness { --c: #f97316; --bg: #ffedd5; }
  .category-german { --c: #3b82f6; --bg: #dbeafe; }
  .category-piano { --c: #a855f7; --bg: #f3e8ff; }
  .category-badminton { --c: #22c55e; --bg: #dcfce7; }
  .category-chess { --c: #0f766e; --bg: #ccfbf1; }
  .category-drawing { --c: #eab308; --bg: #fef9c3; }
  .category-basketball { --c: #f59e0b; --bg: #fef3c7; }
  .category-workshop { --c: #06b6d4; --bg: #cffafe; }
  .category-trip { --c: #ec4899; --bg: #fce7f3; }
  .category-firstaid { --c: #dc2626; --bg: #fee2e2; }
  .category-special { --c: #64748b; --bg: #f1f5f9; }

  @media print {
    body {
      background: #ffffff;
    }

    .page {
      width: auto;
      min-height: auto;
      margin: 0;
      padding: 3mm 4mm;
    }

    .month-title {
      font-size: 20pt;
    }
  }
</style>

const MONTHS = [
  { year: 2026, month: 7, title: "July 2026" },
  { year: 2026, month: 8, title: "August 2026" }
];

const WEEKDAYS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

function pad2(num) {
  return String(num).padStart(2, "0");
}

function dateKey(year, month, day) {
  return `${year}-${pad2(month)}-${pad2(day)}`;
}

function getDaysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

function getFirstDayIndexSundayStart(year, month) {
  return new Date(year, month - 1, 1).getDay();
}

function timeToMinutes(time) {
  if (!time) return -1;
  const [h, m] = time.split(":").map(Number);
  return h * 60 + m;
}

function sortEvents(events) {
  return [...events].sort((a, b) => {
    if (a.allDay && !b.allDay) return -1;
    if (!a.allDay && b.allDay) return 1;
    return timeToMinutes(a.start) - timeToMinutes(b.start);
  });
}

function getEventsForDate(date) {
  return sortEvents(EVENTS.filter(event => event.date === date));
}

function getLocation(event) {
  return event.location || DEFAULT_LOCATIONS[event.category] || "";
}

function createEventHtml(event) {
  const category = event.category || "special";
  const categoryClass = `category-${category}`;
  const allDayClass = event.allDay ? " all-day" : "";
  const timeText = event.allDay ? "All day" : `${event.start}\u2013${event.end}`;
  const location = getLocation(event);

  return `
    <div class="event ${categoryClass}${allDayClass}">
      <span class="time">${escapeHtml(timeText)}</span>
      <span class="name">${escapeHtml(event.title)}</span>
      ${location ? `<span class="loc">@ ${escapeHtml(location)}</span>` : ""}
    </div>
  `;
}

function createDayCell(year, month, day) {
  const key = dateKey(year, month, day);
  const events = getEventsForDate(key);

  return `
    <div class="day">
      <div class="date-line">
        <span class="date-num">${day}</span>
      </div>
      <div class="events">
        ${events.map(createEventHtml).join("")}
      </div>
    </div>
  `;
}

function createEmptyCell() {
  return `<div class="day empty"></div>`;
}

function createMonthPage({ year, month, title }) {
  const daysInMonth = getDaysInMonth(year, month);
  const firstDayIndex = getFirstDayIndexSundayStart(year, month);

  const cells = [];

  for (let i = 0; i < firstDayIndex; i++) {
    cells.push(createEmptyCell());
  }

  for (let day = 1; day <= daysInMonth; day++) {
    cells.push(createDayCell(year, month, day));
  }

  while (cells.length % 7 !== 0) {
    cells.push(createEmptyCell());
  }

  return `
    <section class="page">
      <h1 class="month-title">${escapeHtml(title)}</h1>

      <div class="calendar">
        ${WEEKDAYS.map(day => `<div class="weekday">${day}</div>`).join("")}
        ${cells.join("")}
      </div>
    </section>
  `;
}

function renderCalendar() {
  const root = document.getElementById("calendar-root");
  root.innerHTML = MONTHS.map(createMonthPage).join("");
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

renderCalendar();
