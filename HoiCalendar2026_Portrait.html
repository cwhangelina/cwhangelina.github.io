const MONTHS = [
  { year: 2026, month: 7, label: "7月" },
  { year: 2026, month: 8, label: "8月" }
];

const WEEKDAYS = ["日", "一", "二", "三", "四", "五", "六"];

function pad2(num) {
  return String(num).padStart(2, "0");
}

function dateKey(year, month, day) {
  return `${year}-${pad2(month)}-${pad2(day)}`;
}

function getDaysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

function getFirstDayOfWeek(year, month) {
  return new Date(year, month - 1, 1).getDay();
}

function timeToMinutes(time) {
  if (!time) return -1;
  const [h, m] = time.split(":").map(Number);
  return h * 60 + m;
}

function sortEvents(events) {
  return [...events].sort((a, b) => {
    if (a.allDay && !b.allDay) return -1;
    if (!a.allDay && b.allDay) return 1;
    return timeToMinutes(a.start) - timeToMinutes(b.start);
  });
}

function getEventsForDate(date) {
  return sortEvents(EVENTS.filter(event => event.date === date));
}

function getLocation(event) {
  return event.location || DEFAULT_LOCATIONS[event.category] || "";
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function fillMonth(year, month, label) {
  const daysInMonth = getDaysInMonth(year, month);
  const firstDay = getFirstDayOfWeek(year, month);

  let html = `<div class="month-title">${year}年 ${label}</div>`;
  html += `<table class="month-table"><thead><tr>`;
  WEEKDAYS.forEach(d => html += `<th>${d}</th>`);
  html += `</tr></thead><tbody>`;

  let day = 1;
  for (let w = 0; w < 6; w++) {
    html += `<tr>`;
    for (let d = 0; d < 7; d++) {
      if ((w === 0 && d < firstDay) || day > daysInMonth) {
        html += `<td class="empty"></td>`;
      } else {
        const key = dateKey(year, month, day);
        const events = getEventsForDate(key);

        html += `<td><span class="date-num">${day}</span>`;
        events.forEach(evt => {
          const cat = evt.allDay ? "allday" : evt.category || "special";
          const timeText = evt.allDay ? "全日" : `${evt.start}-${evt.end}`;
          const location = getLocation(evt);

          html += `<span class="activity-chip c-${escapeHtml(cat)}">`;
          html += `<span class="chip-time">${escapeHtml(timeText)}</span>`;
          html += `<span class="chip-name">${escapeHtml(evt.title)}</span>`;
          if (location) {
            html += `<span class="chip-loc">@ ${escapeHtml(location)}</span>`;
          }
          html += `</span>`;
        });
        html += `</td>`;
        day++;
      }
    }
    html += `</tr>`;
    if (day > daysInMonth) break;
  }
  html += `</tbody></table>`;
  return html;
}
